name: 오후 하락 종목 스크리닝

on:
  schedule:
    - cron: '0 7 * * 1-5'  # 오후 4시 KST (7am UTC) 평일
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 백테스트 실행 (전날 종목 성과 확인)
        run: python scripts/backtest.py

      - name: 오늘 하락 종목 스크리닝
        run: python scripts/screener.py

      - name: 결과 커밋 & 푸시
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/
          git diff --staged --quiet || git commit -m "📊 스크리닝 업데이트: $(date '+%Y-%m-%d %H:%M KST')"
          git push
