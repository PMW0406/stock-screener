name: 새벽 미국 시장 분석

on:
  schedule:
    - cron: '0 19 * * 0-4'  # 새벽 4시 KST (7pm UTC 전날) 평일
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 미국 시장 분석
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/us_market.py

      - name: 결과 커밋 & 푸시
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/
          git diff --staged --quiet || git commit -m "🌙 미국 시장 분석: $(date '+%Y-%m-%d %H:%M KST')"
          git push
