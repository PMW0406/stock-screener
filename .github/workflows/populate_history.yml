name: 과거 데이터 수집 (최초 1회 또는 수동)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  populate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 종목 목록 수집 (네이버 금융)
        run: python scripts/build_ticker_list.py

      - name: 과거 90일 데이터 수집 (yfinance)
        run: python scripts/populate_history.py

      - name: 결과 커밋 & 푸시
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/
          git diff --staged --quiet || git commit -m "📅 과거 데이터 수집 완료: $(date '+%Y-%m-%d')"
          git push
