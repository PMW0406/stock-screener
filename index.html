<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주식 스크리너</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d1117; color: #e6edf3; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }

  header {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }
  header h1 { font-size: 17px; font-weight: 600; }
  .updated { font-size: 12px; color: #8b949e; }

  .tabs {
    display: flex;
    gap: 4px;
    padding: 16px 24px 0;
    border-bottom: 1px solid #30363d;
  }
  .tab {
    padding: 8px 16px;
    cursor: pointer;
    border-radius: 6px 6px 0 0;
    font-size: 14px;
    color: #8b949e;
    border: 1px solid transparent;
    border-bottom: none;
    background: transparent;
  }
  .tab.active {
    background: #161b22;
    color: #e6edf3;
    border-color: #30363d;
    border-bottom-color: #161b22;
    margin-bottom: -1px;
  }

  .content { padding: 20px 24px; }
  .panel { display: none; }
  .panel.active { display: block; }

  /* 날짜 선택 바 */
  .date-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .date-bar label { font-size: 13px; color: #8b949e; }
  .date-select {
    background: #161b22;
    border: 1px solid #30363d;
    color: #e6edf3;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
  }
  .date-select:focus { outline: none; border-color: #58a6ff; }

  /* 통계 카드 */
  .stats { display: flex; gap: 12px; margin-bottom: 18px; flex-wrap: wrap; }
  .stat-card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 12px 18px;
    flex: 1;
    min-width: 110px;
  }
  .stat-card .label { font-size: 11px; color: #8b949e; margin-bottom: 4px; }
  .stat-card .value { font-size: 20px; font-weight: 600; }
  .down { color: #f85149; }
  .up { color: #3fb950; }
  .neutral { color: #e6edf3; }

  /* 테이블 */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    background: #161b22;
    padding: 9px 12px;
    text-align: left;
    font-weight: 500;
    color: #8b949e;
    border-bottom: 1px solid #30363d;
    white-space: nowrap;
  }
  td { padding: 9px 12px; border-bottom: 1px solid #21262d; }
  tr:hover td { background: #161b22; }

  .badge {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge.kospi { background: #1f4073; color: #79c0ff; }
  .badge.kosdaq { background: #1a3a2a; color: #3fb950; }

  /* 미국 시장 */
  .market-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 10px;
    margin-bottom: 20px;
  }
  .market-card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 12px 14px;
  }
  .market-card .m-name { font-size: 11px; color: #8b949e; margin-bottom: 5px; }
  .market-card .m-value { font-size: 17px; font-weight: 600; }
  .market-card .m-change { font-size: 12px; margin-top: 2px; }

  .analysis-box {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 18px 20px;
    line-height: 1.75;
    font-size: 14px;
  }
  .analysis-box h2 { font-size: 14px; color: #79c0ff; margin: 14px 0 6px; font-weight: 600; }
  .analysis-box h2:first-child { margin-top: 0; }

  /* 백테스트 */
  .win-bar-wrap { margin-bottom: 18px; }
  .win-bar-label { font-size: 12px; color: #8b949e; margin-bottom: 6px; }
  .win-bar-bg { background: #21262d; border-radius: 4px; height: 8px; overflow: hidden; }
  .win-bar-fill { background: #3fb950; height: 100%; border-radius: 4px; transition: width 0.5s; }

  .loading { color: #8b949e; font-size: 14px; padding: 40px; text-align: center; }
  .error { color: #f85149; font-size: 13px; padding: 16px 18px; background: #1a0e0e; border-radius: 8px; border: 1px solid #3d1a1a; }
  .no-data { color: #8b949e; font-size: 13px; padding: 30px; text-align: center; }

  @media (max-width: 600px) {
    .content { padding: 14px; }
    th, td { padding: 8px; font-size: 12px; }
  }
</style>
</head>
<body>

<header>
  <h1>📊 주식 스크리너</h1>
  <span class="updated" id="last-updated">불러오는 중...</span>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('screening')">하락 종목</button>
  <button class="tab" onclick="switchTab('us')">미국 시장 분석</button>
  <button class="tab" onclick="switchTab('backtest')">백테스트</button>
</div>

<div class="content">

  <!-- 하락 종목 탭 -->
  <div id="panel-screening" class="panel active">
    <div class="date-bar">
      <label>날짜 선택</label>
      <select class="date-select" id="screen-date-select" onchange="loadScreening(this.value)">
        <option value="latest">오늘 (최신)</option>
      </select>
    </div>
    <div id="screening-body"><div class="loading">데이터 불러오는 중...</div></div>
  </div>

  <!-- 미국 시장 분석 탭 -->
  <div id="panel-us" class="panel">
    <div class="date-bar">
      <label>날짜 선택</label>
      <select class="date-select" id="us-date-select" onchange="loadUsAnalysis(this.value)">
        <option value="latest">최신</option>
      </select>
    </div>
    <div id="us-body"><div class="loading">데이터 불러오는 중...</div></div>
  </div>

  <!-- 백테스트 탭 -->
  <div id="panel-backtest" class="panel">
    <div class="date-bar">
      <label>날짜 선택</label>
      <select class="date-select" id="bt-date-select" onchange="loadBacktest(this.value)">
        <option value="all">전체 누적</option>
      </select>
      <span style="font-size:12px;color:#8b949e">※ 하락일 다음날 실제 수익률</span>
    </div>
    <div id="bt-body"><div class="loading">데이터 불러오는 중...</div></div>
  </div>

</div>

<script>
// ── 유틸 ──
const fmt = n => n?.toLocaleString('ko-KR') ?? '-';
const cc = v => v > 0 ? 'up' : v < 0 ? 'down' : 'neutral';
const ct = v => v == null ? '-' : (v > 0 ? '+' : '') + v.toFixed(2) + '%';
const cacheBust = () => '?t=' + Date.now();

function switchTab(name) {
  ['screening','us','backtest'].forEach((n, i) => {
    document.querySelectorAll('.tab')[i].classList.toggle('active', n === name);
    document.getElementById('panel-' + n).classList.toggle('active', n === name);
  });
}

// ── 날짜 목록 로드 ──
async function loadDateList() {
  try {
    const r = await fetch('data/date_list.json' + cacheBust());
    const dates = await r.json();

    const screenSel = document.getElementById('screen-date-select');
    const usSel = document.getElementById('us-date-select');
    const btSel = document.getElementById('bt-date-select');

    dates.forEach(d => {
      const fmt = d.replace(/(\d{4})(\d{2})(\d{2})/, '$1-$2-$3');
      screenSel.add(new Option(fmt, d));
      usSel.add(new Option(fmt, d));
      btSel.add(new Option(fmt, d));
    });
  } catch(e) {
    // date_list.json 없으면 무시
  }
}

// ── 하락 종목 ──
async function loadScreening(dateKey) {
  const el = document.getElementById('screening-body');
  el.innerHTML = '<div class="loading">불러오는 중...</div>';
  const url = dateKey === 'latest'
    ? 'data/latest_screening.json' + cacheBust()
    : `data/screening_${dateKey}.json` + cacheBust();
  try {
    const d = await fetch(url).then(r => r.json());
    document.getElementById('last-updated').textContent = '업데이트: ' + d.updated_at;

    if (!d.stocks?.length) {
      el.innerHTML = '<div class="no-data">해당 날짜에 조건에 맞는 종목이 없습니다.</div>';
      return;
    }

    const kospi = d.stocks.filter(s => s.market === 'KOSPI').length;
    const kosdaq = d.stocks.filter(s => s.market === 'KOSDAQ').length;
    const avg = (d.stocks.reduce((a, s) => a + s.change_rate, 0) / d.stocks.length).toFixed(2);

    el.innerHTML = `
      <div class="stats">
        <div class="stat-card"><div class="label">총 종목</div><div class="value neutral">${d.count}개</div></div>
        <div class="stat-card"><div class="label">코스피</div><div class="value neutral">${kospi}개</div></div>
        <div class="stat-card"><div class="label">코스닥</div><div class="value neutral">${kosdaq}개</div></div>
        <div class="stat-card"><div class="label">평균 하락률</div><div class="value down">${avg}%</div></div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>종목명</th><th>코드</th><th>시장</th>
            <th>현재가</th><th>등락률</th><th>거래량</th><th>시가총액</th>
          </tr></thead>
          <tbody>${d.stocks.map(s => `
            <tr>
              <td><strong>${s.name}</strong></td>
              <td style="color:#8b949e">${s.ticker}</td>
              <td><span class="badge ${s.market.toLowerCase()}">${s.market}</span></td>
              <td>${fmt(s.close)}원</td>
              <td class="down">${s.change_rate.toFixed(2)}%</td>
              <td>${fmt(s.volume)}</td>
              <td>${fmt(s.market_cap_억)}억</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  } catch(e) {
    el.innerHTML = '<div class="error">데이터를 불러오지 못했습니다. 아직 해당 날짜 데이터가 없습니다.</div>';
  }
}

// ── 미국 시장 분석 ──
async function loadUsAnalysis(dateKey) {
  const el = document.getElementById('us-body');
  el.innerHTML = '<div class="loading">불러오는 중...</div>';
  const url = dateKey === 'latest'
    ? 'data/latest_us_analysis.json' + cacheBust()
    : `data/us_analysis_${dateKey}.json` + cacheBust();
  try {
    const d = await fetch(url).then(r => r.json());
    const mktHtml = Object.entries(d.market_data).map(([name, v]) => `
      <div class="market-card">
        <div class="m-name">${name}</div>
        <div class="m-value ${cc(v.change_pct)}">${fmt(v.current)}</div>
        <div class="m-change ${cc(v.change_pct)}">${ct(v.change_pct)}</div>
      </div>`).join('');

    const analysis = d.analysis
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

    el.innerHTML = `
      <div class="market-grid">${mktHtml}</div>
      <div class="analysis-box">${analysis}</div>`;
  } catch(e) {
    el.innerHTML = '<div class="error">미국 시장 분석 데이터가 없습니다.<br>새벽 4시 이후 자동 생성됩니다.</div>';
  }
}

// ── 백테스트 ──
async function loadBacktest(dateKey) {
  const el = document.getElementById('bt-body');
  el.innerHTML = '<div class="loading">불러오는 중...</div>';

  let records = [];
  try {
    if (dateKey === 'all') {
      records = await fetch('data/backtest_history.json' + cacheBust()).then(r => r.json());
    } else {
      const d = await fetch(`data/backtest_${dateKey}.json` + cacheBust()).then(r => r.json());
      records = d.results || [];
    }
  } catch(e) {
    el.innerHTML = '<div class="error">백테스트 데이터가 없습니다. 과거 데이터 수집 후 확인하세요.</div>';
    return;
  }

  if (!records.length) {
    el.innerHTML = '<div class="no-data">해당 날짜의 백테스트 데이터가 없습니다.</div>';
    return;
  }

  const avgOpen = records.reduce((a, r) => a + r.open_return, 0) / records.length;
  const avgClose = records.reduce((a, r) => a + r.close_return, 0) / records.length;
  const winCount = records.filter(r => r.close_return > 0).length;
  const winRate = winCount / records.length * 100;

  el.innerHTML = `
    <div class="stats">
      <div class="stat-card"><div class="label">검증 종목 수</div><div class="value neutral">${records.length}개</div></div>
      <div class="stat-card"><div class="label">평균 시가수익률</div><div class="value ${cc(avgOpen)}">${avgOpen >= 0 ? '+' : ''}${avgOpen.toFixed(2)}%</div></div>
      <div class="stat-card"><div class="label">평균 종가수익률</div><div class="value ${cc(avgClose)}">${avgClose >= 0 ? '+' : ''}${avgClose.toFixed(2)}%</div></div>
      <div class="stat-card"><div class="label">승률</div><div class="value ${winRate >= 50 ? 'up' : 'down'}">${winRate.toFixed(1)}%</div></div>
    </div>
    <div class="win-bar-wrap">
      <div class="win-bar-label">승률 ${winRate.toFixed(1)}% (${winCount}승 / ${records.length - winCount}패)</div>
      <div class="win-bar-bg"><div class="win-bar-fill" style="width:${winRate}%"></div></div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>하락일</th><th>종목명</th><th>시장</th>
          <th>하락률</th><th>다음날 시가수익률</th><th>다음날 종가수익률</th>
        </tr></thead>
        <tbody>${[...records].reverse().map(r => `
          <tr>
            <td style="color:#8b949e">${(r.screen_date||r.date||'').replace(/(\d{4})(\d{2})(\d{2})/,'$1-$2-$3')}</td>
            <td><strong>${r.name}</strong></td>
            <td><span class="badge ${(r.market||'').toLowerCase()}">${r.market||''}</span></td>
            <td class="down">${r.screen_change_rate?.toFixed(2) ?? r.change_rate?.toFixed(2) ?? '-'}%</td>
            <td class="${cc(r.open_return)}">${ct(r.open_return)}</td>
            <td class="${cc(r.close_return)}">${ct(r.close_return)}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

// ── 초기화 ──
loadDateList().then(() => {
  loadScreening('latest');
  loadUsAnalysis('latest');
  loadBacktest('all');
});
</script>
</body>
</html>
