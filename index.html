<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주식 스크리너</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d1117; color: #e6edf3; font-family: 'Segoe UI', sans-serif; }

  header {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 { font-size: 17px; font-weight: 600; }
  .updated { font-size: 12px; color: #8b949e; }

  .tabs {
    display: flex;
    gap: 2px;
    padding: 14px 24px 0;
    border-bottom: 1px solid #30363d;
    overflow-x: auto;
  }
  .tab {
    padding: 8px 14px;
    cursor: pointer;
    border-radius: 6px 6px 0 0;
    font-size: 13px;
    color: #8b949e;
    border: 1px solid transparent;
    border-bottom: none;
    background: transparent;
    white-space: nowrap;
  }
  .tab.active {
    background: #161b22;
    color: #e6edf3;
    border-color: #30363d;
    border-bottom-color: #161b22;
    margin-bottom: -1px;
  }

  .content { padding: 20px 24px; max-width: 1100px; }
  .panel { display: none; }
  .panel.active { display: block; }

  /* 오늘 매수 후보 */
  .candidate-card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 10px;
    padding: 18px 20px;
    margin-bottom: 14px;
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }
  .candidate-rank {
    font-size: 22px;
    font-weight: 700;
    color: #f0a500;
    min-width: 32px;
    text-align: center;
    padding-top: 2px;
  }
  .candidate-info { flex: 1; }
  .candidate-name {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .candidate-ticker { font-size: 12px; color: #8b949e; }
  .candidate-reason { font-size: 13px; color: #c9d1d9; line-height: 1.6; margin-top: 6px; }
  .candidate-stats {
    display: flex;
    gap: 16px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .cstat { font-size: 12px; color: #8b949e; }
  .cstat span { color: #e6edf3; font-weight: 600; }
  .cstat .down { color: #f85149; }
  .cstat .up { color: #3fb950; }

  .summary-box {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 16px 18px;
    margin-bottom: 16px;
    font-size: 13px;
    line-height: 1.7;
    color: #c9d1d9;
  }
  .summary-box h3 { font-size: 13px; color: #79c0ff; margin-bottom: 8px; font-weight: 600; }

  .risk-box {
    background: #1a1a0e;
    border: 1px solid #4a3f00;
    border-radius: 8px;
    padding: 14px 18px;
    margin-top: 16px;
    font-size: 13px;
    color: #d4a017;
    line-height: 1.7;
  }
  .risk-box h3 { color: #f0c040; margin-bottom: 6px; font-weight: 600; }
  .replay-section {
    margin-bottom: 24px;
  }
  .replay-section h3 {
    font-size: 14px;
    font-weight: 600;
    color: #79c0ff;
    margin-bottom: 12px;
  }

  /* 시장 지수 */
  .market-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
    margin-bottom: 18px;
  }
  .market-card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 12px 14px;
  }
  .market-card .m-name  { font-size: 11px; color: #8b949e; margin-bottom: 4px; }
  .market-card .m-value { font-size: 16px; font-weight: 600; }
  .market-card .m-chg   { font-size: 12px; margin-top: 2px; }

  /* 하락 종목 테이블 */
  .date-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .date-bar label { font-size: 12px; color: #8b949e; }
  .date-select {
    background: #161b22; border: 1px solid #30363d; color: #e6edf3;
    padding: 5px 10px; border-radius: 6px; font-size: 12px; cursor: pointer;
  }

  .stats { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .stat-card {
    background: #161b22; border: 1px solid #30363d; border-radius: 8px;
    padding: 10px 16px; flex: 1; min-width: 100px;
  }
  .stat-card .label { font-size: 11px; color: #8b949e; margin-bottom: 3px; }
  .stat-card .value { font-size: 18px; font-weight: 600; }

  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: #161b22; padding: 8px 10px; text-align: left; font-weight: 500; color: #8b949e; border-bottom: 1px solid #30363d; white-space: nowrap; }
  td { padding: 8px 10px; border-bottom: 1px solid #21262d; }
  tr:hover td { background: #161b22; }

  .badge { display: inline-block; padding: 1px 6px; border-radius: 10px; font-size: 10px; font-weight: 600; }
  .badge.kospi  { background: #1f4073; color: #79c0ff; }
  .badge.kosdaq { background: #1a3a2a; color: #3fb950; }

  /* 백테스트 */
  .win-bar-wrap { margin-bottom: 16px; }
  .win-bar-label { font-size: 12px; color: #8b949e; margin-bottom: 5px; }
  .win-bar-bg { background: #21262d; border-radius: 4px; height: 7px; overflow: hidden; }
  .win-bar-fill { background: #3fb950; height: 100%; border-radius: 4px; transition: width 0.5s; }

  .down    { color: #f85149; }
  .up      { color: #3fb950; }
  .neutral { color: #e6edf3; }

  .loading { color: #8b949e; font-size: 13px; padding: 40px; text-align: center; }
  .error   { color: #f85149; font-size: 13px; padding: 14px 16px; background: #1a0e0e; border-radius: 8px; border: 1px solid #3d1a1a; margin-bottom: 12px; }
  .no-data { color: #8b949e; font-size: 13px; padding: 30px; text-align: center; }

  @media (max-width: 600px) {
    .content { padding: 14px; }
    th, td { padding: 6px 8px; font-size: 12px; }
    .candidate-card { flex-direction: column; gap: 8px; }
  }
</style>
</head>
<body>

<header>
  <h1>📊 주식 스크리너</h1>
  <span class="updated" id="last-updated">불러오는 중...</span>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('today')">🎯 오늘 매수 후보</button>
  <button class="tab" onclick="switchTab('replay')">🔍 과거 검증</button>
  <button class="tab" onclick="switchTab('screening')">📉 어제 하락 종목</button>
  <button class="tab" onclick="switchTab('us')">🌙 미국 시장</button>
  <button class="tab" onclick="switchTab('backtest')">📈 백테스트</button>
</div>

<div class="content">

  <!-- 오늘 매수 후보 -->
  <div id="panel-today" class="panel active">
    <div id="today-body"><div class="loading">분석 데이터 불러오는 중...</div></div>
  </div>

  <!-- 과거 검증 -->
  <div id="panel-replay" class="panel">
    <div class="date-bar">
      <label>날짜 선택</label>
      <select class="date-select" id="replay-date-select" onchange="loadReplay(this.value)">
        <option value="">날짜를 선택하세요</option>
      </select>
      <span style="font-size:11px;color:#8b949e">※ 그날 하락 종목 + 미국 시장 + 다음날 실제 결과</span>
    </div>
    <div id="replay-body"><div class="no-data">날짜를 선택하면 그날의 전체 흐름을 보여드립니다.</div></div>
  </div>

  <!-- 어제 하락 종목 -->
  <div id="panel-screening" class="panel">
    <div class="date-bar">
      <label>날짜</label>
      <select class="date-select" id="screen-date-select" onchange="loadScreening(this.value)">
        <option value="latest">최신 (어제)</option>
      </select>
    </div>
    <div id="screening-body"><div class="loading">불러오는 중...</div></div>
  </div>

  <!-- 미국 시장 -->
  <div id="panel-us" class="panel">
    <div id="us-body"><div class="loading">불러오는 중...</div></div>
  </div>

  <!-- 백테스트 -->
  <div id="panel-backtest" class="panel">
    <div class="date-bar">
      <label>날짜</label>
      <select class="date-select" id="bt-date-select" onchange="loadBacktest(this.value)">
        <option value="all">전체 누적</option>
      </select>
      <span style="font-size:11px;color:#8b949e">※ 하락일 다음날 실제 수익률</span>
    </div>
    <div id="bt-body"><div class="loading">불러오는 중...</div></div>
  </div>

</div>

<script>
const fmt  = n => n?.toLocaleString('ko-KR') ?? '-';
const cc   = v => v > 0 ? 'up' : v < 0 ? 'down' : 'neutral';
const ct   = v => v == null ? '-' : (v > 0 ? '+' : '') + v.toFixed(2) + '%';
const bust = () => '?t=' + Date.now();
const fmtDate = s => s ? s.replace(/(\d{4})(\d{2})(\d{2})/, '$1-$2-$3') : '';

function switchTab(name) {
  ['today','replay','screening','us','backtest'].forEach((n, i) => {
    document.querySelectorAll('.tab')[i].classList.toggle('active', n === name);
    document.getElementById('panel-' + n).classList.toggle('active', n === name);
  });
}

// ── 날짜 목록 ──
async function loadDateList() {
  try {
    const dates = await fetch('data/date_list.json' + bust()).then(r => r.json());
    const ss = document.getElementById('screen-date-select');
    const bs = document.getElementById('bt-date-select');
    const rs = document.getElementById('replay-date-select');
    dates.forEach(d => {
      const label = fmtDate(d);
      ss.add(new Option(label, d));
      bs.add(new Option(label, d));
      rs.add(new Option(label, d));
    });
  } catch(e) {}
}

// ── 과거 검증 ──
async function loadReplay(dateKey) {
  const el = document.getElementById('replay-body');
  if (!dateKey) return;
  el.innerHTML = '<div class="loading">불러오는 중...</div>';
  try {
    const [screenRes, usRes, btRes] = await Promise.allSettled([
      fetch(`data/screening_${dateKey}.json` + bust()).then(r => r.json()),
      fetch(`data/us_${dateKey}.json` + bust()).then(r => r.json()),
      fetch(`data/backtest_${dateKey}.json` + bust()).then(r => r.json()),
    ]);

    const screen = screenRes.status === 'fulfilled' ? screenRes.value : null;
    const us     = usRes.status === 'fulfilled'     ? usRes.value     : null;
    const bt     = btRes.status === 'fulfilled'     ? btRes.value     : null;

    if (!screen) {
      el.innerHTML = '<div class="no-data">해당 날짜의 하락 종목 데이터가 없습니다.</div>';
      return;
    }

    // 미국 시장 카드
    const mktHtml = us?.market_data
      ? `<div class="replay-section">
          <h3>🌐 그날 밤 미국 시장 (${fmtDate(dateKey)})</h3>
          <div class="market-grid">${Object.entries(us.market_data).map(([name, v]) => `
            <div class="market-card">
              <div class="m-name">${name}</div>
              <div class="m-value ${cc(v.change_pct)}">${fmt(v.current)}</div>
              <div class="m-chg ${cc(v.change_pct)}">${ct(v.change_pct)}</div>
            </div>`).join('')}
          </div>
        </div>`
      : `<div class="replay-section"><div class="no-data" style="padding:10px">미국 시장 데이터 없음 (과거 데이터 수집 필요)</div></div>`;

    // 백테스트 결과 맵 (ticker → returns)
    const btMap = {};
    (bt?.results || []).forEach(r => { btMap[r.ticker] = r; });

    // 하락 종목 + 다음날 결과 테이블
    const stocks = screen.stocks || [];
    const tableHtml = `
      <div class="replay-section">
        <h3>📉 ${fmtDate(dateKey)} 하락 종목 → 다음날 실제 결과</h3>
        <div class="table-wrap"><table>
          <thead><tr><th>종목명</th><th>시장</th><th>그날 하락률</th><th>다음날 시가↑↓</th><th>다음날 종가↑↓</th></tr></thead>
          <tbody>${stocks.map(s => {
            const r = btMap[s.ticker];
            return `<tr>
              <td><strong>${s.name}</strong> <span style="color:#8b949e;font-size:11px">${s.ticker}</span></td>
              <td><span class="badge ${s.market.toLowerCase()}">${s.market}</span></td>
              <td class="down">${s.change_rate.toFixed(2)}%</td>
              <td class="${r ? cc(r.open_return) : 'neutral'}">${r ? ct(r.open_return) : '-'}</td>
              <td class="${r ? cc(r.close_return) : 'neutral'}">${r ? ct(r.close_return) : '-'}</td>
            </tr>`;
          }).join('')}
          </tbody>
        </table></div>
      </div>`;

    // 요약 통계 (백테스트 데이터 있을 때)
    let summaryHtml = '';
    const btRecords = bt?.results || [];
    if (btRecords.length) {
      const winRate = btRecords.filter(r => r.close_return > 0).length / btRecords.length * 100;
      const avgRet  = btRecords.reduce((a,r) => a + r.close_return, 0) / btRecords.length;
      summaryHtml = `
        <div class="replay-section">
          <h3>📊 그날 전략 성과</h3>
          <div class="stats">
            <div class="stat-card"><div class="label">검증 종목 수</div><div class="value neutral">${btRecords.length}개</div></div>
            <div class="stat-card"><div class="label">평균 종가 수익률</div><div class="value ${cc(avgRet)}">${avgRet>=0?'+':''}${avgRet.toFixed(2)}%</div></div>
            <div class="stat-card"><div class="label">승률</div><div class="value ${winRate>=50?'up':'down'}">${winRate.toFixed(1)}%</div></div>
          </div>
        </div>`;
    }

    el.innerHTML = summaryHtml + mktHtml + tableHtml;
  } catch(e) {
    el.innerHTML = `<div class="error">데이터를 불러오지 못했습니다.<br><small>${e.message}</small></div>`;
  }
}

// ── 오늘 매수 후보 ──
async function loadToday() {
  const el = document.getElementById('today-body');
  try {
    const d = await fetch('data/latest_us_analysis.json' + bust()).then(r => r.json());
    document.getElementById('last-updated').textContent = '분석: ' + d.updated_at;

    const a = d.analysis;
    if (!a || typeof a !== 'object') {
      el.innerHTML = '<div class="error">분석 데이터 형식 오류. 새벽 4시 이후 다시 확인해주세요.</div>';
      return;
    }

    const candidates = a.buy_candidates || [];
    const screenDate = fmtDate(d.screening_date || '');
    const screenCount = d.screening_count || 0;

    // 시장 지수 카드
    const mktHtml = Object.entries(d.market_data || {}).map(([name, v]) => `
      <div class="market-card">
        <div class="m-name">${name}</div>
        <div class="m-value ${cc(v.change_pct)}">${fmt(v.current)}</div>
        <div class="m-chg ${cc(v.change_pct)}">${ct(v.change_pct)}</div>
      </div>`).join('');

    // 매수 후보 카드
    const candHtml = candidates.length === 0
      ? '<div class="no-data">오늘 반등 추천 종목이 없습니다.<br>미국 시장 상황이 좋지 않거나 어제 하락 종목이 없었을 수 있습니다.</div>'
      : candidates.map((c, i) => `
          <div class="candidate-card">
            <div class="candidate-rank">${i + 1}</div>
            <div class="candidate-info">
              <div class="candidate-name">
                ${c.name}
                <span class="candidate-ticker">${c.ticker}</span>
                <span class="badge ${(c.market||'').toLowerCase()}">${c.market||''}</span>
              </div>
              <div class="candidate-reason">${c.reason}</div>
              ${c.close ? `<div class="candidate-stats">
                <div class="cstat">어제 종가 <span>${fmt(c.close)}원</span></div>
                <div class="cstat">어제 등락 <span class="down">${c.change_rate?.toFixed(2)}%</span></div>
                <div class="cstat">시가총액 <span>${fmt(c.market_cap_억)}억</span></div>
              </div>` : ''}
            </div>
          </div>`).join('');

    el.innerHTML = `
      <div class="market-grid">${mktHtml}</div>
      ${a.market_summary ? `<div class="summary-box"><h3>🌐 미국 증시 분위기</h3>${a.market_summary}</div>` : ''}
      ${a.kr_market_outlook ? `<div class="summary-box"><h3>🇰🇷 오늘 한국 시장 예상</h3>${a.kr_market_outlook}</div>` : ''}
      <div style="margin: 16px 0 10px; font-size:13px; color:#8b949e">
        🎯 오늘 매수 후보 — ${screenDate} 하락 종목(${screenCount}개) 중 반등 가능성 높은 순
      </div>
      ${candHtml}
      ${a.risk_factors ? `<div class="risk-box"><h3>⚠️ 오늘 주의사항</h3>${a.risk_factors}</div>` : ''}`;

  } catch(e) {
    el.innerHTML = `<div class="error">
      매수 후보 데이터를 불러오지 못했습니다.<br>
      새벽 4시에 자동 생성됩니다. 아직 없거나 준비 중일 수 있습니다.<br>
      <small style="color:#666">오류: ${e.message}</small>
    </div>`;
  }
}

// ── 어제 하락 종목 ──
async function loadScreening(dateKey) {
  const el = document.getElementById('screening-body');
  el.innerHTML = '<div class="loading">불러오는 중...</div>';
  const url = dateKey === 'latest'
    ? 'data/latest_screening.json' + bust()
    : `data/screening_${dateKey}.json` + bust();
  try {
    const d = await fetch(url).then(r => r.json());
    if (!d.stocks?.length) {
      el.innerHTML = '<div class="no-data">해당 날짜에 조건에 맞는 종목이 없습니다.</div>';
      return;
    }
    const kospi  = d.stocks.filter(s => s.market === 'KOSPI').length;
    const kosdaq = d.stocks.filter(s => s.market === 'KOSDAQ').length;
    const avg    = (d.stocks.reduce((a,s) => a + s.change_rate, 0) / d.stocks.length).toFixed(2);

    el.innerHTML = `
      <div class="stats">
        <div class="stat-card"><div class="label">총 종목</div><div class="value neutral">${d.count}개</div></div>
        <div class="stat-card"><div class="label">코스피</div><div class="value neutral">${kospi}개</div></div>
        <div class="stat-card"><div class="label">코스닥</div><div class="value neutral">${kosdaq}개</div></div>
        <div class="stat-card"><div class="label">평균 하락률</div><div class="value down">${avg}%</div></div>
      </div>
      <div class="table-wrap"><table>
        <thead><tr><th>종목명</th><th>코드</th><th>시장</th><th>종가</th><th>등락률</th><th>거래량</th><th>시가총액</th></tr></thead>
        <tbody>${d.stocks.map(s => `
          <tr>
            <td><strong>${s.name}</strong></td>
            <td style="color:#8b949e">${s.ticker}</td>
            <td><span class="badge ${s.market.toLowerCase()}">${s.market}</span></td>
            <td>${fmt(s.close)}원</td>
            <td class="down">${s.change_rate.toFixed(2)}%</td>
            <td>${fmt(s.volume)}</td>
            <td>${fmt(s.market_cap_억)}억</td>
          </tr>`).join('')}
        </tbody>
      </table></div>`;
  } catch(e) {
    el.innerHTML = '<div class="error">데이터를 불러오지 못했습니다.</div>';
  }
}

// ── 미국 시장 ──
async function loadUs() {
  const el = document.getElementById('us-body');
  try {
    const d = await fetch('data/latest_us_analysis.json' + bust()).then(r => r.json());
    const a = d.analysis || {};
    const mktHtml = Object.entries(d.market_data || {}).map(([name, v]) => `
      <div class="market-card">
        <div class="m-name">${name}</div>
        <div class="m-value ${cc(v.change_pct)}">${fmt(v.current)}</div>
        <div class="m-chg ${cc(v.change_pct)}">${ct(v.change_pct)}</div>
      </div>`).join('');
    el.innerHTML = `
      <div class="market-grid">${mktHtml}</div>
      ${a.market_summary ? `<div class="summary-box"><h3>미국 증시 분위기</h3>${a.market_summary}</div>` : ''}
      ${a.kr_market_outlook ? `<div class="summary-box"><h3>한국 시장 영향</h3>${a.kr_market_outlook}</div>` : ''}
      ${a.risk_factors ? `<div class="risk-box"><h3>⚠️ 리스크 요인</h3>${a.risk_factors}</div>` : ''}`;
  } catch(e) {
    el.innerHTML = '<div class="error">미국 시장 분석 데이터가 없습니다.<br>새벽 4시 이후 자동 생성됩니다.</div>';
  }
}

// ── 백테스트 ──
async function loadBacktest(dateKey) {
  const el = document.getElementById('bt-body');
  el.innerHTML = '<div class="loading">불러오는 중...</div>';
  let records = [];
  try {
    if (dateKey === 'all') {
      records = await fetch('data/backtest_history.json' + bust()).then(r => r.json());
    } else {
      const d = await fetch(`data/backtest_${dateKey}.json` + bust()).then(r => r.json());
      records = d.results || [];
    }
  } catch(e) {
    el.innerHTML = '<div class="error">백테스트 데이터가 없습니다.</div>'; return;
  }
  if (!records.length) {
    el.innerHTML = '<div class="no-data">해당 날짜의 백테스트 데이터가 없습니다.</div>'; return;
  }

  const avgClose = records.reduce((a,r) => a + r.close_return, 0) / records.length;
  const winCount = records.filter(r => r.close_return > 0).length;
  const winRate  = winCount / records.length * 100;
  const avgOpen  = records.reduce((a,r) => a + (r.open_return||0), 0) / records.length;

  el.innerHTML = `
    <div class="stats">
      <div class="stat-card"><div class="label">검증 종목 수</div><div class="value neutral">${records.length}개</div></div>
      <div class="stat-card"><div class="label">다음날 시가수익률</div><div class="value ${cc(avgOpen)}">${avgOpen>=0?'+':''}${avgOpen.toFixed(2)}%</div></div>
      <div class="stat-card"><div class="label">다음날 종가수익률</div><div class="value ${cc(avgClose)}">${avgClose>=0?'+':''}${avgClose.toFixed(2)}%</div></div>
      <div class="stat-card"><div class="label">승률</div><div class="value ${winRate>=50?'up':'down'}">${winRate.toFixed(1)}%</div></div>
    </div>
    <div class="win-bar-wrap">
      <div class="win-bar-label">승률 ${winRate.toFixed(1)}% — ${winCount}승 / ${records.length-winCount}패</div>
      <div class="win-bar-bg"><div class="win-bar-fill" style="width:${winRate}%"></div></div>
    </div>
    <div class="table-wrap"><table>
      <thead><tr><th>하락일</th><th>종목명</th><th>시장</th><th>하락률</th><th>다음날 시가↑↓</th><th>다음날 종가↑↓</th></tr></thead>
      <tbody>${[...records].reverse().map(r => `
        <tr>
          <td style="color:#8b949e">${fmtDate(r.screen_date||r.date||'')}</td>
          <td><strong>${r.name}</strong></td>
          <td><span class="badge ${(r.market||'').toLowerCase()}">${r.market||''}</span></td>
          <td class="down">${(r.screen_change_rate??r.change_rate??0).toFixed(2)}%</td>
          <td class="${cc(r.open_return)}">${ct(r.open_return)}</td>
          <td class="${cc(r.close_return)}">${ct(r.close_return)}</td>
        </tr>`).join('')}
      </tbody>
    </table></div>`;
}

// ── 초기화 ──
loadDateList();
loadToday();
loadUs();
loadScreening('latest');
loadBacktest('all');
</script>
