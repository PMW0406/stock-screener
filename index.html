<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주식 스크리너</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d1117; color: #e6edf3; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }

  header {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 { font-size: 18px; font-weight: 600; color: #e6edf3; }
  .updated { font-size: 12px; color: #8b949e; }

  .tabs {
    display: flex;
    gap: 4px;
    padding: 16px 24px 0;
    border-bottom: 1px solid #30363d;
  }
  .tab {
    padding: 8px 16px;
    cursor: pointer;
    border-radius: 6px 6px 0 0;
    font-size: 14px;
    color: #8b949e;
    border: 1px solid transparent;
    border-bottom: none;
    background: transparent;
  }
  .tab.active {
    background: #161b22;
    color: #e6edf3;
    border-color: #30363d;
    border-bottom-color: #161b22;
    margin-bottom: -1px;
  }

  .content { padding: 24px; }
  .panel { display: none; }
  .panel.active { display: block; }

  /* 스크리닝 테이블 */
  .stats {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .stat-card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 12px 20px;
    flex: 1;
    min-width: 120px;
  }
  .stat-card .label { font-size: 12px; color: #8b949e; margin-bottom: 4px; }
  .stat-card .value { font-size: 20px; font-weight: 600; }
  .stat-card .value.down { color: #f85149; }
  .stat-card .value.up { color: #3fb950; }
  .stat-card .value.neutral { color: #e6edf3; }

  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th {
    background: #161b22;
    padding: 10px 12px;
    text-align: left;
    font-weight: 500;
    color: #8b949e;
    border-bottom: 1px solid #30363d;
    white-space: nowrap;
  }
  td { padding: 10px 12px; border-bottom: 1px solid #21262d; }
  tr:hover td { background: #161b22; }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge.kospi { background: #1f4073; color: #79c0ff; }
  .badge.kosdaq { background: #1a3a2a; color: #3fb950; }
  .down { color: #f85149; }
  .up { color: #3fb950; }

  /* 미국 시장 분석 */
  .market-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .market-card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 14px 16px;
  }
  .market-card .m-name { font-size: 12px; color: #8b949e; margin-bottom: 6px; }
  .market-card .m-value { font-size: 18px; font-weight: 600; }
  .market-card .m-change { font-size: 13px; margin-top: 2px; }

  .analysis-box {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 20px;
    line-height: 1.7;
    white-space: pre-wrap;
    font-size: 14px;
  }
  .analysis-box h2 { font-size: 15px; color: #79c0ff; margin-top: 16px; margin-bottom: 8px; }
  .analysis-box h2:first-child { margin-top: 0; }

  /* 백테스트 */
  .bt-summary {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .loading { color: #8b949e; font-size: 14px; padding: 40px; text-align: center; }
  .error { color: #f85149; font-size: 14px; padding: 20px; background: #1a0e0e; border-radius: 8px; }

  @media (max-width: 600px) {
    .content { padding: 16px; }
    th, td { padding: 8px; font-size: 13px; }
  }
</style>
</head>
<body>

<header>
  <h1>📊 주식 스크리너</h1>
  <span class="updated" id="last-updated">불러오는 중...</span>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('screening')">오늘 하락 종목</button>
  <button class="tab" onclick="switchTab('us')">미국 시장 분석</button>
  <button class="tab" onclick="switchTab('backtest')">백테스트</button>
</div>

<div class="content">

  <!-- 스크리닝 탭 -->
  <div id="panel-screening" class="panel active">
    <div class="loading" id="screening-loading">데이터 불러오는 중...</div>
    <div id="screening-content" style="display:none">
      <div class="stats" id="screening-stats"></div>
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr>
              <th>종목명</th>
              <th>코드</th>
              <th>시장</th>
              <th>현재가</th>
              <th>등락률</th>
              <th>거래량</th>
              <th>시가총액</th>
            </tr>
          </thead>
          <tbody id="screening-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 미국 시장 탭 -->
  <div id="panel-us" class="panel">
    <div class="loading" id="us-loading">데이터 불러오는 중...</div>
    <div id="us-content" style="display:none">
      <div class="market-grid" id="market-grid"></div>
      <div class="analysis-box" id="analysis-text"></div>
    </div>
  </div>

  <!-- 백테스트 탭 -->
  <div id="panel-backtest" class="panel">
    <div class="loading" id="bt-loading">데이터 불러오는 중...</div>
    <div id="bt-content" style="display:none">
      <div class="bt-summary stats" id="bt-stats"></div>
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr>
              <th>스크리닝일</th>
              <th>종목명</th>
              <th>시장</th>
              <th>하락률</th>
              <th>다음날 시가수익률</th>
              <th>다음날 종가수익률</th>
            </tr>
          </thead>
          <tbody id="bt-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<script>
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    const names = ['screening', 'us', 'backtest'];
    t.classList.toggle('active', names[i] === name);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
}

function fmt(n) {
  return n?.toLocaleString('ko-KR') ?? '-';
}

function changeClass(v) {
  return v > 0 ? 'up' : v < 0 ? 'down' : '';
}

function changeText(v) {
  if (v == null) return '-';
  return (v > 0 ? '+' : '') + v.toFixed(2) + '%';
}

// 스크리닝
fetch('data/latest_screening.json?t=' + Date.now())
  .then(r => r.json())
  .then(d => {
    document.getElementById('screening-loading').style.display = 'none';
    document.getElementById('screening-content').style.display = 'block';
    document.getElementById('last-updated').textContent = '업데이트: ' + d.updated_at;

    const kospi = d.stocks.filter(s => s.market === 'KOSPI').length;
    const kosdaq = d.stocks.filter(s => s.market === 'KOSDAQ').length;
    const avgChange = d.stocks.length
      ? (d.stocks.reduce((a, s) => a + s.change_rate, 0) / d.stocks.length).toFixed(2)
      : 0;

    document.getElementById('screening-stats').innerHTML = `
      <div class="stat-card"><div class="label">총 종목 수</div><div class="value neutral">${d.count}개</div></div>
      <div class="stat-card"><div class="label">코스피</div><div class="value neutral">${kospi}개</div></div>
      <div class="stat-card"><div class="label">코스닥</div><div class="value neutral">${kosdaq}개</div></div>
      <div class="stat-card"><div class="label">평균 하락률</div><div class="value down">${avgChange}%</div></div>
    `;

    document.getElementById('screening-tbody').innerHTML = d.stocks.map(s => `
      <tr>
        <td><strong>${s.name}</strong></td>
        <td style="color:#8b949e">${s.ticker}</td>
        <td><span class="badge ${s.market.toLowerCase()}">${s.market}</span></td>
        <td>${fmt(s.close)}원</td>
        <td class="down">${s.change_rate.toFixed(2)}%</td>
        <td>${fmt(s.volume)}</td>
        <td>${fmt(s.market_cap_억)}억</td>
      </tr>
    `).join('');
  })
  .catch(() => {
    document.getElementById('screening-loading').innerHTML = '<div class="error">스크리닝 데이터를 불러오지 못했습니다.<br>아직 오늘 데이터가 없거나 오류가 발생했습니다.</div>';
  });

// 미국 시장 분석
fetch('data/latest_us_analysis.json?t=' + Date.now())
  .then(r => r.json())
  .then(d => {
    document.getElementById('us-loading').style.display = 'none';
    document.getElementById('us-content').style.display = 'block';

    document.getElementById('market-grid').innerHTML = Object.entries(d.market_data).map(([name, v]) => `
      <div class="market-card">
        <div class="m-name">${name}</div>
        <div class="m-value ${changeClass(v.change_pct)}">${fmt(v.current)}</div>
        <div class="m-change ${changeClass(v.change_pct)}">${changeText(v.change_pct)}</div>
      </div>
    `).join('');

    const formatted = d.analysis
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/\n/g, '\n');
    document.getElementById('analysis-text').innerHTML = formatted;
  })
  .catch(() => {
    document.getElementById('us-loading').innerHTML = '<div class="error">미국 시장 분석 데이터를 불러오지 못했습니다.<br>새벽 4시 이후 확인해주세요.</div>';
  });

// 백테스트
fetch('data/backtest_history.json?t=' + Date.now())
  .then(r => r.json())
  .then(records => {
    document.getElementById('bt-loading').style.display = 'none';
    document.getElementById('bt-content').style.display = 'block';

    const sorted = [...records].reverse();
    const avgOpen = records.length ? records.reduce((a, r) => a + r.open_return, 0) / records.length : 0;
    const avgClose = records.length ? records.reduce((a, r) => a + r.close_return, 0) / records.length : 0;
    const winRate = records.length ? records.filter(r => r.close_return > 0).length / records.length * 100 : 0;

    document.getElementById('bt-stats').innerHTML = `
      <div class="stat-card"><div class="label">총 검증 종목</div><div class="value neutral">${records.length}개</div></div>
      <div class="stat-card"><div class="label">평균 시가수익률</div><div class="value ${changeClass(avgOpen)}">${avgOpen >= 0 ? '+' : ''}${avgOpen.toFixed(2)}%</div></div>
      <div class="stat-card"><div class="label">평균 종가수익률</div><div class="value ${changeClass(avgClose)}">${avgClose >= 0 ? '+' : ''}${avgClose.toFixed(2)}%</div></div>
      <div class="stat-card"><div class="label">승률 (종가 기준)</div><div class="value ${winRate >= 50 ? 'up' : 'down'}">${winRate.toFixed(1)}%</div></div>
    `;

    document.getElementById('bt-tbody').innerHTML = sorted.map(r => `
      <tr>
        <td style="color:#8b949e">${r.screen_date}</td>
        <td><strong>${r.name}</strong></td>
        <td><span class="badge ${r.market.toLowerCase()}">${r.market}</span></td>
        <td class="down">${r.screen_change_rate.toFixed(2)}%</td>
        <td class="${changeClass(r.open_return)}">${changeText(r.open_return)}</td>
        <td class="${changeClass(r.close_return)}">${changeText(r.close_return)}</td>
      </tr>
    `).join('');
  })
  .catch(() => {
    document.getElementById('bt-loading').innerHTML = '<div class="error">백테스트 데이터가 아직 없습니다.<br>스크리닝이 며칠 쌓이면 자동으로 생성됩니다.</div>';
  });
</script>
</body>
</html>
